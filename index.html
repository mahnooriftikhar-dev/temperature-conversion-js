<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temprature Converter</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="box" name="box">
        <label for="Temprature" id="Temprature">Enter Temprature To Convert Fahrenheit To Celsius
            OR Celsius To Fahrenheit </label>
        <br>
        <input type="number" id="Temprature" name="Temprature" min="0" max="100">
        <br>
        <label for="Temprature-Conversion">Select Option For Temprature-Conversion</label>
        <br>
        <select id="Temprature-Conversion" name="Temprature-Conversion">

            <option value=""> Select Temprature  Conversion Here</option>
            <option value="Fahrenheit To Celsius">Fahrenheit To Celsius</option>
            <option value=" Celsius To Fahrenheit"> Celsius To Fahrenheit</option>

        </select>
        <br>
          <input type="submit" name="submit" value="Click For Temprature-Conversion">
    </div>
    <script src="script.js"></script>
</body>

</html>
